<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Logo: Clean upward trend with AI sparkle -->
  <g id="logo-icon">
    <!-- Main icon container -->
    <g transform="translate(12, 12)">
      <!-- Background circle with subtle gradient effect -->
      <circle cx="12" cy="12" r="12" fill="currentColor" fill-opacity="0.08"/>
      
      <!-- Upward trending arrow/line (bidding up) -->
      <path d="M4 18 L8 14 L12 10 L16 14 L20 10" 
            stroke="currentColor" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"
            fill="none"/>
      
      <!-- Arrow head pointing up -->
      <path d="M18 12 L20 10 L22 12" 
            stroke="currentColor" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"
            fill="none"/>
      
      <!-- AI sparkle/accent dots -->
      <circle cx="6" cy="16" r="1.5" fill="currentColor" fill-opacity="0.6"/>
      <circle cx="10" cy="12" r="1.5" fill="currentColor" fill-opacity="0.6"/>
      <circle cx="14" cy="12" r="1.5" fill="currentColor" fill-opacity="0.6"/>
    </g>
  </g>
  
  <!-- Text: Auto Bidder -->
  <g id="logo-text">
    <text x="52" y="20" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="currentColor" letter-spacing="-0.03em">
      Auto Bidder
    </text>
    <text x="52" y="35" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9.5" font-weight="500" fill="currentColor" fill-opacity="0.6" letter-spacing="0.05em" text-transform="uppercase">
      AI-Powered Proposals
    </text>
  </g>
</svg>
