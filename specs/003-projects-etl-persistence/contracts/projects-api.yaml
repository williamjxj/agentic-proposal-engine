# API Contract: Projects / Jobs (003-projects-etl-persistence)
# Persist jobs to DB, fast list/discover, status tracking
# Aligns with FR-001 through FR-010

openapi: 3.0.3
info:
  title: Auto-Bidder Projects API
  version: 2.0.0
  description: Job discovery with persistence, domain filter, and status tracking

paths:
  /api/projects/list:
    get:
      summary: List jobs from database (FR-001, FR-006, FR-008)
      operationId: listProjects
      tags: [projects]
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Comma-separated keywords for full-text search
        - name: platform
          in: query
          schema:
            type: string
            enum: [upwork, freelancer, huggingface_dataset, other]
        - name: status
          in: query
          schema:
            type: string
            enum: [new, reviewed, applied, won, lost, archived]
        - name: category
          in: query
          schema:
            type: string
        - name: applied
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [date, category, budget]
            default: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated job list from database
          content:
            application/json:
              schema:
                type: object
                required: [jobs, total, page, pages, limit, source]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  total:
                    type: integer
                  page:
                    type: integer
                  pages:
                    type: integer
                  limit:
                    type: integer
                  source:
                    type: string
                    example: database

  /api/projects/discover:
    post:
      summary: Discover jobs, persist to DB, return results (FR-007)
      operationId: discoverProjects
      tags: [projects]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [keywords]
              properties:
                keywords:
                  type: array
                  items:
                    type: string
                max_results:
                  type: integer
                  default: 50
                dataset_id:
                  type: string
      responses:
        '200':
          description: Discovered jobs (stored and returned)
          content:
            application/json:
              schema:
                type: object
                required: [success, source, count, jobs]
                properties:
                  success:
                    type: boolean
                  source:
                    type: string
                  dataset_used:
                    type: string
                  count:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'

  /api/projects/{project_id}:
    get:
      summary: Get single job by ID (FR-001)
      operationId: getProject
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found

    put:
      summary: Update job status (FR-005)
      operationId: updateProjectStatus
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum: [new, reviewed, applied, won, lost, archived]
      responses:
        '200':
          description: Updated job
        '400':
          description: Invalid status
        '404':
          description: Job not found

  /api/projects/stats:
    get:
      summary: Project statistics from database (FR-001)
      operationId: getProjectStats
      tags: [projects]
      responses:
        '200':
          description: Aggregated stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_jobs:
                    type: integer
                  by_platform:
                    type: object
                  by_skill:
                    type: object
                  avg_budget:
                    type: number
                  top_in_demand_skill:
                    type: string
                  data_source:
                    type: string

  /api/projects/datasets:
    get:
      summary: List available HuggingFace datasets
      operationId: listDatasets
      tags: [projects]
      responses:
        '200':
          description: Dataset list

  /api/etl/runs:
    get:
      summary: List ETL run history (FR-009)
      operationId: listEtlRuns
      tags: [etl]
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: ETL run log

  /api/etl/trigger:
    post:
      summary: Trigger manual ETL run (admin/dev)
      operationId: triggerEtl
      tags: [etl]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  example: hf_loader
      responses:
        '202':
          description: ETL run started

components:
  schemas:
    Job:
      type: object
      required: [id, title, description, platform]
      properties:
        id:
          type: string
          format: uuid
        external_id:
          type: string
        title:
          type: string
        description:
          type: string
        company:
          type: string
        skills:
          type: array
          items:
            type: string
        budget:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
        platform:
          type: string
        status:
          type: string
        posted_at:
          type: string
          format: date-time
        source:
          type: string
