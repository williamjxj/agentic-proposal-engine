openapi: 3.0.3
info:
  title: Settings API
  description: API for managing user settings, preferences, and credentials
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
  - url: https://api.auto-bidder.com/api

tags:
  - name: settings
    description: User settings management

paths:
  /settings:
    get:
      tags: [settings]
      summary: Get user settings
      operationId: getSettings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Settings retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'

  /settings/preferences:
    patch:
      tags: [settings]
      summary: Update user preferences
      operationId: updatePreferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: Preferences updated

  /settings/credentials:
    get:
      tags: [settings]
      summary: List platform credentials
      operationId: listCredentials
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Credentials retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlatformCredential'

    post:
      tags: [settings]
      summary: Add or update platform credential
      operationId: upsertCredential
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialUpsert'
      responses:
        '200':
          description: Credential saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCredential'

  /settings/credentials/{credential_id}:
    delete:
      tags: [settings]
      summary: Delete platform credential
      operationId: deleteCredential
      security:
        - BearerAuth: []
      parameters:
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Credential deleted

  /settings/credentials/{credential_id}/verify:
    post:
      tags: [settings]
      summary: Verify platform credential
      operationId: verifyCredential
      security:
        - BearerAuth: []
      parameters:
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'

  /settings/subscription:
    get:
      tags: [settings]
      summary: Get subscription information
      operationId: getSubscription
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subscription info retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionInfo'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserSettings:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/UserProfile'
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/PlatformCredential'
        subscription:
          $ref: '#/components/schemas/SubscriptionInfo'

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        subscription_tier:
          type: string
          enum: [free, pro, agency]
        subscription_status:
          type: string
          enum: [active, cancelled, expired]

    UserPreferences:
      type: object
      properties:
        default_strategy_id:
          type: string
          format: uuid
          nullable: true
        notification_email:
          type: boolean
        notification_browser:
          type: boolean
        theme:
          type: string
          enum: [system, light, dark]
        language:
          type: string

    PlatformCredential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [upwork, freelancer, custom]
        is_active:
          type: boolean
        last_verified_at:
          type: string
          format: date-time
          nullable: true
        verification_error:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    CredentialUpsert:
      type: object
      required:
        - platform
      properties:
        platform:
          type: string
          enum: [upwork, freelancer, custom]
        api_key:
          type: string
        api_secret:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string

    VerificationResult:
      type: object
      properties:
        is_valid:
          type: boolean
        verified_at:
          type: string
          format: date-time
        error:
          type: string
          nullable: true

    SubscriptionInfo:
      type: object
      properties:
        tier:
          type: string
          enum: [free, pro, agency]
        status:
          type: string
          enum: [active, cancelled, expired]
        expires_at:
          type: string
          format: date-time
          nullable: true
        usage_quota:
          type: object
          properties:
            proposals_generated:
              type: integer
            proposals_limit:
              type: integer
            period_start:
              type: string
              format: date-time
